name: 🚀 Deploy to Hostinger via SSH

on:
  push:
    branches:
      - main   # change if your branch is different

jobs:
  deploy:
    name: 🎯 Deploy Website
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🔐 Deploy to Hostinger via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USERNAME }}
          password: ${{ secrets.HOSTINGER_PASSWORD }}
          port: 22
          script: |
            echo "🚀 Starting deployment..."

            # Go to project directory
            cd /home/${{ secrets.HOSTINGER_USERNAME }}/public_html

            # If repo not cloned yet, clone it
            if [ ! -d ".git" ]; then
              echo "📦 Cloning repository..."
              git clone https://github.com/${{ github.repository }} .
            fi

            # Pull latest changes
            echo "🔄 Pulling latest code..."
            git fetch origin
            git reset --hard origin/main

            # Optional: install dependencies (uncomment if needed)

            # For Node.js project:
            # npm install
            # npm run build

            # For PHP / Laravel:
            # composer install --no-dev --optimize-autoloader
            # php artisan migrate --force

            # Fix permissions (important for some setups)
            echo "🔧 Setting permissions..."
            chmod -R 755 /home/${{ secrets.HOSTINGER_USERNAME }}/public_html

            echo "✅ Deployment completed!"